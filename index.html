
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งข้อมูลไปยัง Google Apps Script</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --background-color: #f8fafc;
            --card-background: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'ChulaCharasNew', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 8px;
            font-size: 24px;
            color: var(--text-color);
            text-align: center;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fff;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background-color: #ecfdf5;
            color: var(--success-color);
            border: 1px solid #a7f3d0;
        }

        .message.error {
            display: block;
            background-color: #fef2f2;
            color: var(--error-color);
            border: 1px solid #fecaca;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ฟอร์มบันทึกข้อมูล</h2>
    <p class="subtitle">ระบบเชื่อมต่อกับ Google Apps Script Web App (GitHub Pages Ready)</p>
    
    <form id="dataForm">
        <div class="form-group">
            <label for="name">ชื่อ-นามสกุล (Name)</label>
            <input type="text" id="name" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
        </div>
        
        <div class="form-group">
            <label for="email">อีเมล (Email)</label>
            <input type="email" id="email" name="email" placeholder="example@domain.com" required>
        </div>
        
        <div class="form-group">
            <label for="message">ข้อความ / รายละเอียด (Message)</label>
            <textarea id="message" name="message" placeholder="กรุณากรอกรายละเอียดที่ต้องการส่ง" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">ส่งข้อมูล</button>
    </form>
    
    <div id="responseMessage" class="message"></div>
    
    <div class="footer-note">
        Hosted on GitHub Pages &bull; Powered by Google Apps Script
    </div>
</div>

<script>
    // URL ของ Google Apps Script Web App ที่ให้มา
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxK5fJWckMtO8bI3UL85f6kl3Swo2OA_xqykQbqfjQp9BlJFDf7I8CEP87HpgmF5NFJDQ/exec';
    
    const form = document.getElementById('dataForm');
    const submitBtn = document.getElementById('submitBtn');
    const responseMessage = document.getElementById('responseMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // เปลี่ยนสถานะปุ่มเป็นกำลังโหลด
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span>กำลังส่งข้อมูล...';
        
        // ซ่อนข้อความแจ้งเตือนเดิม (ถ้ามี)
        responseMessage.style.display = 'none';
        responseMessage.className = 'message';

        // ดึงข้อมูลจากฟอร์ม
        const formData = new FormData(form);

        // ส่งข้อมูลไปยัง Google Apps Script Web App ด้วย fetch (POST)
        fetch(scriptURL, { 
            method: 'POST', 
            body: formData
        })
        .then(response => {
            // คืนค่าสถานะปุ่ม
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ส่งข้อมูล';
            
            // แสดงข้อความสำเร็จ
            responseMessage.innerText = 'บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!';
            responseMessage.classList.add('success');
            
            // ล้างข้อมูลในฟอร์มหลังจากส่งเสร็จ
            form.reset();
        })
        .catch(error => {
            // คืนค่าสถานะปุ่ม
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'ส่งข้อมูล';
            
            // แสดงข้อความเมื่อเกิดข้อผิดพลาด
            responseMessage.innerText = 'เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง';
            responseMessage.classList.add('error');
            console.error('Error!', error.message);
        });
    });
</script>

</body>
</html>
